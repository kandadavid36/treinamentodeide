<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description" content="Viaja em qualquer lugar do mundo">
    <link rel="stylesheet" type="text/css" href="_css/estilo.css">
    <link rel="stylesheet" type="text/css" href="_css/form.css">
    <link rel="shortcut icon" type="image/x-icon" href="_imagens/ic2.png">
    <title>Tudo Sobre Viagem</title>
</head>
<body>
<div id="interface"><!-- Inicio da interface -->
    <header id="cabecalho"><!--Inicio do cabecalho-->
        <h1>Viagem</h1>
        <h2>Viaja com Estilo</h2>
        <nav id="menu"><!--Inicio do menu-->
	    	<a href="index.html"> Home</a>
	        <a href="detalhe.html"> Detalhes</a>
	        <a href="fotos.html"> Galeria</a>
	        <a href="midia.html"> Multimídia</a>
	        <a href="formulario.html"> Contato</a>
    	</nav><!--fim do menu-->
    </header><!---fim cabecalho-->
    <img src="_imagens/pub.gif" width="100%">
    <section id="corpo-full">
        <h1>Saiba tudo sobre o Viagem Por <span><sub>Gilson Baptista</sub></span></h1>
        <h3 class="direita">Atualizado em 23/Abril/2018</h3>
        <form method="post" id="fContato"><!--Inicio do formulario-->
            <!-------------------------------------------------------------------->
            <fieldset id="usuario">
                <legend>Identificação do Usuário</legend>
                    <p><label for="cNome">Nome:</label> <input class="est" type="text" name="tNome" id="cNome" size="20" placeholder="Digita Seu Nome"/></p>
                    <p><label for="cSenha">Senha:</label> <input class="est" type="password" name="tSenha" id="cSenha" size="20" placeholder="8 Digitos"/></p>
                    <p><label for="cMail">E-mail:</label><input class="est" type="email" placeholder="Seu Em@ail" name="tMail" id="cMail"/></p>
                    <p><label for="ctel">Tel:</label><input class="est" type="tel" placeholder="Seu tel" name="tTel" id="ctwl"/></p>
                    <fieldset id="sexo">
                        <legend>Sexo:</legend>
                            <input type="radio" id="cMasc" name="tSexo" checked/> <label for="cMasc">Masculino</label><br/>
                            <input type="radio" id="cFeme" name="tSexo"/> <label for="cFeme">Feminino</label>
                    </fieldset>
                    <p><label for="cDate">Nascimento:</label><input type="date" name="tDade" id="cDate"/></p>
            </fieldset>
            <!------------------------------------------------------------------------------>
            <fieldset id="endereco">
                <legend>Local da Viagem</legend>
                <p><label for="cEstado">País:</label>
                <select id="cEstado" name="tEstado">
                    <option>Alemanha</option>
                    <option selected>Inglaterra</option>
                    <option>Italia</option>
					<option>Espanha</option>
					<option>França</option>
                </select> </p>
                <p><label for="cProv">Cidade:</label><input name="tProv" id="cProv" type="text" placeholder="Seu Nunucipio" list="cidade"/><p>
                <datalist id="cidade">
                    <option value="Londres"></option>
                    <option value="Roma"></option>
					<option value="Turin"></option>
                    <option value="Madrid"></option>
                    <option value="Barcelona"></option>
					<option value="Paris"></option>
					<option value="Monaco"></option>
					<option value="Liverpool"></option>
					<option value="Manchester"></option>
                </datalist>
            </fieldset>
            <!------------------------------------------------------------------------------>
            <fieldset id="mensagen">
                <legend>Mensagem do Usuário</legend>
                <p><label for="cUrg">Grau de Urgência:</label> Mim<input type="range" name="tUrg" id="cUrg" min="0" max="10" step="2"/>Max<p>
                <p><label>Mensagem:</label><textarea id="cMsg" name="tMsg" placeholder="Deixa Sua Mensagem"></textarea><p>
            </fieldset>
            <!------------------------------------------------------------------------------>
            <fieldset id="pedido">
                <legend>Viajar</legend>
                    <p><input type="checkbox" id="cPed" name="tPed"/><label for="cPed"> Gostaria de um lugar quando disponível</label><p>
                    <p><label for="cCor">Cor:</label><input type="color" name="tCor" id="cCor" value="#ff0000"/><p>
                    <p><label for="cQtd">Nº Passoa:<input type="number" name="tQtd" id="cQtd" min="0" max="5" value="0"/>
                    </label><p>
            </fieldset>
            <!------------------------------------------------------------------------------>
            <p>
                <input class="bot" type="submit" name="tEnviar" value="pedir" /> 
                <input class="bot" type="reset" name="tEnviar"/ value="Limpar">
            <p>
        </form>
        
    </section>

</html>
